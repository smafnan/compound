name: Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync web build into the Android project
        run: npx cap sync android

      - name: Assemble debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Collect APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Compound-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Compound-Android
          path: Compound-android.apk

      - name: Attach APK to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Compound-android.apk
          generate_release_notes: true
